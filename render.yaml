# Render Blueprint for the LMS — a FastAPI web service + Postgres database.
#
# Mirrors the trip-planner/render.yaml shape (also stranske/*). Connect this
# repo via the Render dashboard ("New +" → "Blueprint") and Render reads this
# file to provision the service and DB. See docs/development/deployment.md.
#
# Secrets (everything with ``sync: false``) MUST be set in the Render dashboard
# under the service's "Environment" tab — they are never committed here.

services:
  - type: web
    name: learning-management-system
    runtime: python
    # Starter (~$7/mo at the time of this writing): the web service stays
    # awake — no 15-minute sleep, no ~30-second cold start. The right
    # baseline for a learning loop the project owner expects to log into
    # daily. Web-service plan is fully reversible via the dashboard
    # (Settings → Instance Type) — flip back to ``free`` to pause billing
    # during long idle stretches; data on the Postgres instance is
    # unaffected by the web-service plan choice.
    plan: starter
    # Build: install the project + locked deps into Render's managed venv.
    buildCommand: >-
      python -m pip install --upgrade pip &&
      python -m pip install uv &&
      uv pip sync --system requirements.lock &&
      python -m pip install --no-deps -e .
    # Pre-deploy migration: runs once before the new instance accepts traffic.
    # We invoke through ``python -m alembic.config`` (not bare ``alembic`` and
    # not ``python -m alembic``) for two reasons:
    #
    # 1. ``alembic`` is a console-script entry point installed under the
    #    project venv's ``bin/`` directory. Render's preDeploy shell does
    #    not put that bin on ``PATH``, so the bare command fails with
    #    ``alembic: command not found`` (exit 127).
    # 2. The ``alembic`` PACKAGE itself does not ship an ``__main__.py``
    #    module, so ``python -m alembic ...`` fails with
    #    ``'alembic' is a package and cannot be directly executed``
    #    (exit 1). The CLI's real entry point lives in
    #    ``alembic/config.py`` under an ``if __name__ == '__main__': main()``
    #    guard, which means ``python -m alembic.config <args>`` works
    #    portably regardless of how Render lays out the venv.
    preDeployCommand: python -m alembic.config upgrade head
    startCommand: uvicorn lms.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # --- Required ---
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: AUTH_REQUIRED
        value: "true"
      - key: AUTH_SECRET_KEY
        # Render will autogenerate a strong value on first deploy. Rotate via
        # the dashboard when needed.
        generateValue: true
      - key: ENABLE_LOCAL_IDENTITY_ROUTES
        value: "false"

      # --- Optional / set via dashboard ---
      # Anthropic LLM provider (issue #179). Required only if the deployed
      # study-coach path is exercised.
      - key: CLAUDE_API_STRANSKE
        sync: false
      # LangSmith tracing key (M5).
      - key: LANGSMITH_API_KEY
        sync: false
      # Daily LLM budget in USD; used by the budget guard.
      - key: LLM_DAILY_BUDGET_USD
        sync: false

databases:
  - name: lms-db
    # ``basic-256mb`` (~$6/mo + $0.30/GB storage = ~$6.30/mo for 1 GB at the
    # time of this writing): persistent Postgres with no 90-day retention
    # clock. Required for the LMS — the whole point of the system is durable
    # evidence + scheduling state, so the data must survive longer than 3
    # months. Render renamed the Postgres tiers in 2025; the legacy
    # ``starter`` name is rejected for new databases.
    #
    # Available Postgres plan values (Render's current naming):
    #   - ``free``         — $0/mo, 256 MB RAM, 0.1 CPU, 1 GB storage,
    #                        90-day expiry
    #   - ``basic-256mb``  — $6/mo + storage, 256 MB RAM, 0.1 CPU
    #   - ``basic-1gb``    — $19/mo + storage, 1 GB RAM, 0.5 CPU
    #   - ``basic-4gb``    — $75/mo + storage, 4 GB RAM, 2 CPU
    #   - ``pro-*`` and ``accelerated-*`` for production workloads
    #
    # NOTE: Postgres plan changes are NOT symmetric. You can upgrade
    # ``basic-256mb`` → larger paid tiers in the dashboard, but Render does
    # not offer a built-in paid → ``free`` downgrade (free is effectively a
    # separate product with the 90-day clock). If you ever need to downgrade,
    # the path is: ``pg_dump`` from this DB, create a new free DB,
    # ``pg_restore``, swap ``DATABASE_URL``, decommission the original.
    plan: basic-256mb
    databaseName: lms
